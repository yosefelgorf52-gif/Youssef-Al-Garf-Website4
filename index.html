<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSSEF TV PRO</title>
    <style>
        /* إجبار الصفحة على ملء الشاشة ومنع أي تمرير خارج منطقة الأزرار */
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: #fbc02d; font-family: sans-serif; overflow: hidden; }
        
        /* الهيدر ثابت في الأعلى */
        .header { background: #fbc02d; padding: 10px; border-bottom: 2px solid #e6b800; display: flex; align-items: center; justify-content: space-between; color: white; flex-shrink: 0; }
        
        /* منطقة الأزرار هي الوحيدة التي ستتحرك (scroll) */
        .btn-container { flex: 1; padding: 10px; overflow-y: auto; }
        .btn { display: block; background: white; color: #fbc02d; padding: 15px; margin-bottom: 8px; text-align: center; font-weight: bold; border-radius: 5px; text-decoration: none; border: 2px solid #fff; }
        
        /* الفوتر ثابت في الأسفل دائماً */
        .footer { background: #fbc02d; display: flex; border-top: 2px solid #e6b800; flex-shrink: 0; }
        .footer a { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: white; font-weight: bold; }
        .active-tab { background: #e6b800; }
        
        /* القائمة الجانبية كما هي */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 10; top: 0; right: 0; background-color: #fff; overflow-x: hidden; transition: 0.3s; padding-top: 60px; box-shadow: -2px 0 5px rgba(0,0,0,0.2); }
        .sidebar a { padding: 15px; display: block; color: #fbc02d; font-weight: bold; text-decoration: none; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="openNav()">☰</div>
        <input type="text" style="width:50%; padding:8px; border-radius:5px; border:none;" placeholder="البحث...">
        <div onclick="location.reload()" style="cursor:pointer; font-size:20px;">🔄</div>
    </div>

    <div class="sidebar" id="mySidebar">
        <a href="javascript:void(0)" onclick="closeNav()">إغلاق &times;</a>
        <a href="subscribe.html">الاشتراك</a>
    </div>

    <!-- هذه المنطقة هي الوحيدة التي ستتحرك -->
    <div class="btn-container">
        <a href="#" class="btn">beIN SPORTS MAX</a>
        <a href="#" class="btn">beIN SPORTS (1080P)</a>
        <a href="#" class="btn">beIN SPORTS (720P)</a>
        <a href="#" class="btn">beIN SPORTS (360P)</a>
        <a href="#" class="btn">beIN SPORTS (244P)</a>
        <a href="#" class="btn">beIN ENTERTAINMENT</a>
        <a href="#" class="btn">ARABIC CHANNELS</a>
        <a href="#" class="btn">MBC CHANNELS</a>
        <a href="#" class="btn">FRANCE CHANNELS</a>
        <a href="#" class="btn">TURKISH CHANNELS</a>
        <a href="#" class="btn">KIDS CHANNELS</a>
        <a href="#" class="btn">WEYYAK</a>
        <a href="#" class="btn">SHAHID VIP</a>
    </div>

    <!-- الفوتر الثابت دائماً -->
    <div class="footer">
        <a href="index.html" class="active-tab">LIVE TV</a>
        <a href="live_event.html">LIVE EVENT</a>
    </div>

    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    </script>
</body>
</html>
