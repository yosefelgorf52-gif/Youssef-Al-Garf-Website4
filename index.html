<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOUSSEF TV PRO</title>
    <style>
        body { background-color: #fbc02d; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fbc02d; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .logo-img { width: 120px; }
        .header { background: #fbc02d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e6b800; }
        .menu-icon { font-size: 25px; color: white; cursor: pointer; }
        .title { color: white; font-weight: bold; font-size: 18px; }
        .btn-container { padding: 10px; display: flex; flex-direction: column; gap: 8px; height: 85vh; overflow-y: auto; }
        .btn { background: white; color: #fbc02d; padding: 15px; text-align: center; font-weight: bold; border-radius: 5px; text-decoration: none; border: 1px solid #ddd; }
        .drawer { height: 100%; width: 0; position: fixed; z-index: 500; top: 0; right: 0; background-color: #fff; overflow-x: hidden; transition: 0.3s; padding-top: 60px; box-shadow: -2px 0 5px rgba(0,0,0,0.2); }
        .drawer a { padding: 15px; display: block; color: #fbc02d; text-decoration: none; font-weight: bold; border-bottom: 1px solid #eee; }
        .overlay { position: fixed; display: none; width: 100%; height: 100%; top: 0; left: 0; z-index: 400; }
    </style>
</head>
<body>
    <div id="splash"><img src="logo.png" class="logo-img"></div>
    <div id="overlay" class="overlay" onclick="closeDrawer()"></div>

    <div class="header">
        <div class="menu-icon" onclick="openDrawer()">☰</div>
        <div class="title">YOUSSEF TV PRO</div>
        <div class="menu-icon">🔍</div>
    </div>

    <div class="drawer" id="myDrawer">
        <a href="index.html">الرئيسية</a>
        <a href="subscribe.html">الاشتراك</a>
    </div>

    <div class="btn-container">
        <a href="bein_max.html" class="btn">beIN SPORTS MAX</a>
        <a href="bein_1080.html" class="btn">beIN SPORTS (1080P)</a>
        <a href="bein_720.html" class="btn">beIN SPORTS (720P)</a>
        <a href="bein_360.html" class="btn">beIN SPORTS (360P)</a>
        <a href="bein_244.html" class="btn">beIN SPORTS (244P)</a>
        <a href="bein_ent.html" class="btn">beIN ENTERTAINMENT</a>
        <a href="arabic.html" class="btn">ARABIC CHANNELS</a>
        <a href="mbc.html" class="btn">MBC CHANNELS</a>
        <a href="france.html" class="btn">FRANCE CHANNELS</a>
        <a href="turkish.html" class="btn">TURKISH CHANNELS</a>
        <a href="kids.html" class="btn">KIDS CHANNELS</a>
        <a href="weyyak.html" class="btn">WEYYAK</a>
        <a href="shahid.html" class="btn">SHAHID VIP</a>
    </div>

    <script>
        setTimeout(() => document.getElementById('splash').style.display = 'none', 2000);
        function openDrawer() { document.getElementById("myDrawer").style.width = "250px"; document.getElementById("overlay").style.display = "block"; }
        function closeDrawer() { document.getElementById("myDrawer").style.width = "0"; document.getElementById("overlay").style.display = "none"; }
    </script>
</body>
</html>
