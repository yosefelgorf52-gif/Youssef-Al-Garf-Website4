    <title>beIN SPORTS (720P)</title>
    <style>
        body { margin: 0; background-color: #fbc02d; font-family: sans-serif; }
        .header { background: #fbc02d; padding: 15px; border-bottom: 2px solid #e6b800; display: flex; align-items: center; color: white; font-weight: bold; font-size: 20px; position: sticky; top: 0; z-index: 100; }
        .back-btn { margin-left: 15px; cursor: pointer; font-size: 24px; }
        
        /* تقسيم الشبكة */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        
        /* شكل المربع */
        .channel-link { 
            display: block; 
            background: white; 
            padding: 5px; 
            border-radius: 8px; 
            border: 2px solid #fff;
        }
        
        .channel-link img { width: 100%; height: auto; display: block; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">&#8592;</div>
        <div>beIN SPORTS (720P)</div>
    </div>
    <div class="grid-container">
