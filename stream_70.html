<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>beIN SPORTS MAX</title>
    <!-- مكتبة مشغل الفيديو Plyr (تعطيك جودة عالية وتحكم كامل) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .player-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="player-container">
    <video id="player" playsinline controls>
        <source src="رابط_البث_المباشر_هنا.m3u8" type="application/x-mpegURL">
    </video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    // تفعيل المشغل
    const player = new Plyr('#player');

    // كود إجبار الشاشة على العرض (Landscape) بمجرد فتح الصفحة
    function lockOrientation() {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    }
    
    // تشغيل القفل عند التحميل
    window.onload = lockOrientation;
    
    // العودة للوضع الأصلي عند الرجوع
    window.onbeforeunload = () => {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    };
</script>

</body>
</html>
