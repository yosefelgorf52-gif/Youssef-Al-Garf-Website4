<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- مكتبة Plyr -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        .landscape-wrapper {
            transform: rotate(90deg);
            transform-origin: bottom left;
            width: 100vh;
            height: 100vw;
            position: absolute;
            top: -100vw;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-container { width: 100%; height: 100%; }
        /* جعل المشغل يغطي كل شيء */
        .plyr { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div class="landscape-wrapper">
    <div class="player-container">
        <video id="player" playsinline controls poster="logo.png">
            <!-- ضع رابط البث هنا -->
            <source src="رابط_البث_هنا.m3u8" type="application/x-mpegURL">
        </video>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const player = new Plyr('#player', {
        // هذه هي الإعدادات التي تظهر في الصورة الثانية
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
        settings: ['quality', 'speed'],
        quality: { default: 1080, options: [1080, 720, 480, 360] },
        hideControls: true, // هذه الميزة تجعل التحكم يختفي تلقائياً عند عدم اللمس
        clickToPlay: true
    });
</script>

</body>
</html>
