<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        .landscape-wrapper {
            transform: rotate(90deg); transform-origin: bottom left;
            width: 100vh; height: 100vw; position: absolute; top: -100vw; left: 0;
        }
        .player-container { width: 100%; height: 100%; }
        .plyr { height: 100%; width: 100%; }
        /* إخفاء التحكم */
        .plyr--hide-controls .plyr__controls { opacity: 0; }
    </style>
</head>
<body>
    <div class="landscape-wrapper">
        <div class="player-container">
            <video id="player" playsinline controls>
                <source src="رابط_البث_هنا.m3u8" type="application/x-mpegURL">
            </video>
        </div>
    </div>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', {
            controls: ['play', 'progress', 'current-time', 'settings', 'fullscreen'],
            settings: ['quality'],
            quality: { default: 1080, options: [1080, 720, 480, 360] }
        });

        // منطق الإظهار والإخفاء التلقائي
        let timer;
        const container = document.querySelector('.player-container');
        function resetTimer() {
            container.classList.remove('plyr--hide-controls');
            clearTimeout(timer);
            timer = setTimeout(() => { container.classList.add('plyr--hide-controls'); }, 2000);
        }
        container.addEventListener('touchstart', resetTimer);
        resetTimer();
    </script>
</body>
</html>
