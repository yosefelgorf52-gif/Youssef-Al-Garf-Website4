<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* شاشة التحميل (يرجى الانتظار) */
        #loader { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; color: #fff; display: flex; 
            justify-content: center; align-items: center; z-index: 100;
        }

        /* حاوية الفيديو */
        #player-wrapper { position: relative; width: 100vw; height: 100vh; }
        
        iframe { width: 100%; height: 100%; pointer-events: none; }

        /* طبقة الأزرار (القائمة السفلية) */
        #ui-layer { 
            position: absolute; bottom: 30px; left: 0; right: 0; 
            display: flex; justify-content: center; gap: 20px; z-index: 50;
            opacity: 0; transition: opacity 0.3s;
        }
        
        .btn { 
            padding: 12px 25px; background: rgba(0,0,0,0.7); 
            border: 1px solid #e50914; color: white; 
            border-radius: 50px; cursor: pointer; font-size: 16px;
        }

        .show { opacity: 1 !important; }
    </style>
</head>
<body>

    <!-- 1. شاشة الانتظار -->
    <div id="loader">يرجى الانتظار... يتم تجهيز البث</div>

    <!-- 2. المشغل -->
    <div id="player-wrapper">
        <iframe id="video-frame" 
                src="https://www.youtube.com/embed/ekMxMIexsJ8?controls=0&autoplay=1&mute=0" 
                frameborder="0" allow="autoplay; fullscreen"></iframe>
        
        <!-- 3. قائمة التحكم (تظهر بالضغط) -->
        <div id="ui-layer">
            <button class="btn" onclick="changeQuality('ekMxMIexsJ8')">جودة 1080p</button>
            <button class="btn" onclick="changeQuality('ekMxMIexsJ8')">جودة 720p</button>
            <button class="btn" onclick="changeQuality('ekMxMIexsJ8')">جودة 480p</button>
        </div>
    </div>

<script>
    const ui = document.getElementById('ui-layer');
    const iframe = document.getElementById('video-frame');
    let timeout;

    // إخفاء شاشة الانتظار بعد 3 ثواني
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 3000);
    };

    // إظهار وإخفاء الأزرار عند الضغط
    document.getElementById('player-wrapper').addEventListener('click', () => {
        ui.classList.add('show');
        clearTimeout(timeout);
        timeout = setTimeout(() => { ui.classList.remove('show'); }, 3000);
    });

    // دالة تبديل الجودة (هنا تضع روابط الجودات المختلفة لكل قناة)
    function changeQuality(videoId) {
        // يمكنك تغيير الرابط هنا حسب الجودة المطلوبة
        iframe.src = "https://www.youtube.com/embed/" + videoId + "?controls=0&autoplay=1";
        ui.classList.remove('show'); // إخفاء القائمة بعد الاختيار
    }
</script>

</body>
</html>
